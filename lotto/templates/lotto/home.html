{% extends "base.html" %}

{% block content %}
    <h2>메인 페이지</h2>

    <p>Django와 Docker를 활용한 6/45 로또 웹 사이트입니다.</p>

    {% if user.is_authenticated %}
        <p>{{ user.username }}님, 환영합니다.</p>
    {% else %}
        <p>로또 구매 기능을 사용하려면 로그인 또는 회원가입을 해주세요.</p>

        <p>
            <a href="{% url 'login' %}">로그인</a>
            |
            <a href="{% url 'lotto:signup' %}">회원가입</a>
        </p>
    {% endif %}
{% endblock %}
