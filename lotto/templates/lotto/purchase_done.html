{% extends "base.html" %}

{% block content %}
    <h2>자동 로또 구매 완료</h2>

    <p>자동 번호로 로또를 구매했습니다.</p>

    <ul>
        <li>회차: {{ ticket.lotto_round.round_number }}회차</li>
        <li>구매 번호: {{ ticket.numbers }}</li>
        <li>구매 방식: {{ ticket.get_purchase_type_display }}</li>
        <li>구매 일시: {{ ticket.purchased_at }}</li>
    </ul>

    <p>
        <a href="{% url 'lotto:home' %}">메인으로 돌아가기</a>
    </p>
{% endblock %}
