{% extends "base.html" %}

{% block content %}
    <h2 class="page-title">수동 로또 구매</h2>
    <p class="page-description">1부터 45 사이의 숫자 중 6개를 선택하세요.</p>

    <form method="post" id="manual-lotto-form">
        {% csrf_token %}

        <!-- 선택된 번호를 서버로 보내기 위한 숨겨진 입력값 -->
        <input type="hidden" name="numbers" id="selected-numbers-input">

        <div class="lotto-number-board">
            {% for number in numbers %}
                <button
                    type="button"
                    class="lotto-number-button"
                    data-number="{{ number }}"
                >
                    {{ number }}
                </button>
            {% endfor %}
        </div>

        <p>
            선택한 번호:
            <strong id="selected-numbers-text">없음</strong>
        </p>

        <p id="selection-message" class="error"></p>

        {% if form.numbers.errors %}
            <p class="error">{{ form.numbers.errors }}</p>
        {% endif %}

        <button type="submit">수동 구매</button>
        <a class="button-secondary" href="{% url 'lotto:home' %}">메인으로 돌아가기</a>
    </form>

    <script>
        const selectedNumbers = [];
        const maxSelectionCount = 6;

        const buttons = document.querySelectorAll(".lotto-number-button");
        const selectedNumbersInput = document.getElementById("selected-numbers-input");
        const selectedNumbersText = document.getElementById("selected-numbers-text");
        const selectionMessage = document.getElementById("selection-message");
        const form = document.getElementById("manual-lotto-form");

        function updateSelectedNumbersView() {
            const sortedNumbers = [...selectedNumbers].sort((a, b) => a - b);

            selectedNumbersInput.value = sortedNumbers.join(",");

            if (sortedNumbers.length === 0) {
                selectedNumbersText.textContent = "없음";
            } else {
                selectedNumbersText.textContent = sortedNumbers.join(", ");
            }

            buttons.forEach((button) => {
                const number = Number(button.dataset.number);
                const isSelected = selectedNumbers.includes(number);

                button.classList.toggle("selected", isSelected);

                // 6개가 선택되면 선택되지 않은 번호는 더 이상 누르지 못하게 한다.
                button.disabled = selectedNumbers.length >= maxSelectionCount && !isSelected;
            });
        }

        buttons.forEach((button) => {
            button.addEventListener("click", () => {
                const number = Number(button.dataset.number);
                const selectedIndex = selectedNumbers.indexOf(number);

                if (selectedIndex >= 0) {
                    // 이미 선택한 번호를 다시 누르면 선택 해제한다.
                    selectedNumbers.splice(selectedIndex, 1);
                    selectionMessage.textContent = "";
                } else {
                    if (selectedNumbers.length >= maxSelectionCount) {
                        selectionMessage.textContent = "로또 번호는 최대 6개까지만 선택할 수 있습니다.";
                        return;
                    }

                    selectedNumbers.push(number);
                    selectionMessage.textContent = "";
                }

                updateSelectedNumbersView();
            });
        });

        form.addEventListener("submit", (event) => {
            if (selectedNumbers.length !== maxSelectionCount) {
                event.preventDefault();
                selectionMessage.textContent = "로또 번호를 정확히 6개 선택해야 합니다.";
            }
        });

        updateSelectedNumbersView();
    </script>
{% endblock %}
