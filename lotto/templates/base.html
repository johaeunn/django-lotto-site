<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6/45 Lotto</title>
</head>
<body>
    <header>
        <h1><a href="{% url 'lotto:home' %}">6/45 Lotto</a></h1>

        <nav>
            {% if user.is_authenticated %}
                <span>{{ user.username }}님</span>

                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit">로그아웃</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">로그인</a>
                <a href="{% url 'lotto:signup' %}">회원가입</a>
            {% endif %}

            <a href="/admin/">관리자</a>
        </nav>
    </header>

    <hr>

    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
