{% extends "base.html" %}

{% block content %}
    <h2>로그인</h2>

    {% if form.errors %}
        <p style="color: red;">아이디 또는 비밀번호가 올바르지 않습니다.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <p>
            <label for="{{ form.username.id_for_label }}">아이디</label><br>
            {{ form.username }}
        </p>

        <p>
            <label for="{{ form.password.id_for_label }}">비밀번호</label><br>
            {{ form.password }}
        </p>

        <button type="submit">로그인</button>
    </form>

    <p>
        계정이 없나요?
        <a href="{% url 'lotto:signup' %}">회원가입</a>
    </p>
{% endblock %}
